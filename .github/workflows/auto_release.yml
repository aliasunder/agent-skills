name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches tag
        env:
          TAG_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch! Tag is v$TAG_VERSION but package.json has $PKG_VERSION"
            exit 1
          fi
          echo "Version matches v$TAG_VERSION"

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(bash .github/scripts/generate-notes.sh "$GITHUB_REF_NAME")
          echo "$NOTES" > /tmp/release-notes.md

      - name: Build artifacts
        run: |
          for SKILL_DIR in skills/*/; do
            SKILL_NAME=$(basename "$SKILL_DIR")
            echo "Building $SKILL_NAME.zip..."
            (cd skills && zip -r "../${SKILL_NAME}.zip" "$SKILL_NAME/")
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACTS=$(find . -maxdepth 1 -name '*.zip' -print)
          gh release create "$GITHUB_REF_NAME" $ARTIFACTS \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md

      - name: Update changelog
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: bash .github/scripts/update-changelog.sh "$VERSION" /tmp/release-notes.md

      - name: Commit changelog update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git checkout main
          git stash pop
          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "docs: update CHANGELOG.md for $GITHUB_REF_NAME"
          git push origin main
