name: Manual Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: next
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEXT ($BUMP)"

      - name: Update version
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          jq --arg v "$NEXT" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "Updated package.json → $NEXT"

      - name: Generate release notes
        run: |
          bash .github/scripts/generate-notes.sh HEAD > /tmp/release-notes.md

      - name: Update changelog
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: bash .github/scripts/update-changelog.sh "$NEXT" /tmp/release-notes.md

      - name: Commit, tag, and push
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${NEXT}"
          git tag "v${NEXT}"
          git push origin HEAD --tags

      - name: Build artifacts
        run: |
          for SKILL_DIR in skills/*/; do
            SKILL_NAME=$(basename "$SKILL_DIR")
            echo "Building $SKILL_NAME.zip..."
            (cd skills && zip -r "../${SKILL_NAME}.zip" "$SKILL_NAME/")
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          ARTIFACTS=$(find . -maxdepth 1 -name '*.zip' -print)
          gh release create "v${NEXT}" $ARTIFACTS \
            --title "v${NEXT}" \
            --notes-file /tmp/release-notes.md
